    <style>
        :root {
            --red: #FB7185;
            --blue: #38BDF8;
            --yellow: #FDE047;
            --green: #4ADE80;
            --purple: #C084FC;
            --bg: #F8FAFC;
            --slate-800: #1E293B;
            --slate-300: #E2E8F0;
            --orange: #FB923C;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            font-family: 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            transition: background-color 1s ease;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #target {
            position: absolute;
            width: 48vmin;
            height: 48vmin;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 15px 45px rgba(0,0,0,0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translate(-50%, -50%) scale(1);
            animation: appear 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            touch-action: manipulation;
            z-index: 20;
        }

        #target:active {
            transform: translate(-50%, -50%) scale(0.85);
        }

        @keyframes appear {
            0% { transform: translate(-50%, -50%) scale(0.2) rotate(-45deg); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0); opacity: 1; }
        }

        svg {
            width: 70%;
            height: 70%;
            fill: white;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.12));
        }

        #hud {
            position: absolute;
            top: env(safe-area-inset-top, 24px);
            left: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 30;
            pointer-events: none;
        }

        .hud-item {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 24px;
            border: 2px solid var(--slate-300);
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }

        #score-board {
            font-size: 32px;
            font-weight: 900;
            color: var(--slate-800);
        }

        .stats-row {
            display: flex;
            gap: 10px;
        }

        #level-badge {
            background: var(--slate-800);
            color: white;
            padding: 8px 20px;
            border-radius: 999px;
            font-weight: 800;
            font-size: 18px;
            border: 2px solid white;
        }

        #combo-badge {
            background: var(--orange);
            color: white;
            padding: 8px 20px;
            border-radius: 999px;
            font-weight: 900;
            font-size: 18px;
            font-style: italic;
            border: 2px solid white;
            display: none;
            animation: combo-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes combo-in {
            0% { transform: scale(0); }
            70% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        #click-progress {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 30;
            pointer-events: none;
        }

        .progress-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            border: 3px solid var(--slate-300);
            transition: all 0.3s ease;
        }

        .progress-dot.active {
            background: var(--yellow);
            border-color: var(--orange);
            transform: scale(1.2);
            box-shadow: 0 0 20px rgba(250,204,21,0.6);
        }

        #reward-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(25px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            pointer-events: none;
        }

        #reward-icon {
            width: 200px;
            height: 200px;
            fill: var(--yellow);
            filter: drop-shadow(0 0 35px rgba(250,204,21,0.6));
        }

        .reward-text {
            font-size: 64px;
            font-weight: 900;
            color: var(--slate-800);
            margin-top: 30px;
            letter-spacing: -2px;
            text-align: center;
        }

        .particle {
            position: absolute;
            width: 40px;
            height: 40px;
            pointer-events: none;
            z-index: 110;
        }

        .firework-particle {
            position: absolute;
            width: 20px;
            height: 20px;
            pointer-events: none;
            z-index: 90;
            border-radius: 50%;
        }

        .firework-particle.star {
            width: 30px;
            height: 30px;
            border-radius: 0;
        }

        #hint {
            position: absolute;
            bottom: 60px;
            width: 100%;
            text-align: center;
            color: #94A3B8;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 2px;
            animation: hint-bounce 1.5s infinite;
        }

        @keyframes hint-bounce {
            0%, 100% { transform: translateY(0); opacity: 0.5; }
            50% { transform: translateY(-20px); opacity: 1; }
        }

        #flash {
            position: fixed;
            inset: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 15;
        }

        .firework-hint {
            position: absolute;
            bottom: 180px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
            font-weight: 900;
            color: var(--orange);
            text-shadow: 0 0 20px rgba(251,146,60,0.5);
            animation: firework-pulse 0.5s ease infinite;
            z-index: 25;
            pointer-events: none;
            white-space: nowrap;
        }

        @keyframes firework-pulse {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.2); }
        }

        @media (min-width: 768px) {
            #score-board { font-size: 48px; }
            .reward-text { font-size: 96px; }
            #level-badge, #combo-badge { font-size: 24px; }
            .progress-dot { width: 32px; height: 32px; }
        }
    </style>
</head>

        ];

        let shapeBag = [];
        function getNextShape() {
            if (shapeBag.length === 0) {
                shapeBag = [...ALL_SHAPES];
                for (let i = shapeBag.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shapeBag[i], shapeBag[j]] = [shapeBag[j], shapeBag[i]];
                }
                console.log("图案包已重置，开始新的一轮不重复挑战！");
            }
            return shapeBag.pop();
        }

        function updateProgressDots() {
            for (let i = 1; i <= 5; i++) {
                const dot = document.getElementById('dot' + i);
                if (i <= clickCount) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            }
        }

        function playSound(type) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);

                if (type === 'level') {
                    const freqs = [523.25, 659.25, 783.99, 1046.50];
                    freqs.forEach((f, i) => {
                        const o = audioCtx.createOscillator();
                        const g = audioCtx.createGain();
                        o.connect(g); g.connect(audioCtx.destination);
                        o.type = 'triangle';
                        o.frequency.setValueAtTime(f, now + i * 0.12);
                        g.gain.setValueAtTime(0.2, now + i * 0.12);
                        g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.12 + 0.4);
                        o.start(now + i * 0.12); o.stop(now + i * 0.12 + 0.4);
                    });
                } else if (type === 'pop') {
                    osc.frequency.setValueAtTime(320, now);
                    osc.frequency.exponentialRampToValueAtTime(80, now + 0.1);
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start(); osc.stop(now + 0.1);
                } else if (type === 'explode') {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(140, now);
                    osc.frequency.exponentialRampToValueAtTime(30, now + 0.5);
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    osc.start(); osc.stop(now + 0.5);
                } else if (type === 'firework') {
                    const freqs = [400, 500, 600, 800];
                    freqs.forEach((f, i) => {
                        const o = audioCtx.createOscillator();
                        const g = audioCtx.createGain();
                        o.connect(g); g.connect(audioCtx.destination);
                        o.type = 'sine';
                        o.frequency.setValueAtTime(f, now + i * 0.1);
                        g.gain.setValueAtTime(0.15, now + i * 0.1);
                        g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.3);
                        o.start(now + i * 0.1); o.stop(now + i * 0.1 + 0.3);
                    });
                }
            } catch(e) {}
        }

        function createSingleFirework(x, y, color) {
            const particleCount = 12;
            for (let i = 0; i < particleCount; i++) {
                const p = document.createElement('div');
                p.classList.add('firework-particle');
                if (Math.random() > 0.5) p.classList.add('star');
                
                const angle = (i / particleCount) * Math.PI * 2;
                const dist = 80 + Math.random() * 60;
                const tx = Math.cos(angle) * dist;
                const ty = Math.sin(angle) * dist;
                
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                p.style.backgroundColor = color;
                p.style.boxShadow = `0 0 15px ${color}, 0 0 30px ${color}`;
                
                if (p.classList.contains('star')) {
                    p.innerHTML = '<svg viewBox="0 0 24 24" width="100%" height="100%"><path fill="' + color + '" d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';
                }
                
                document.body.appendChild(p);
                
                const rotation = Math.random() * 720 - 360;
                p.animate([
                    { 
                        transform: 'translate(-50%, -50%) scale(0) rotate(0deg)', 
                        opacity: 1 
                    },
                    { 
                        transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(2) rotate(${rotation}deg)`, 
                        opacity: 0 
                    }
                ], { 
                    duration: 1000 + Math.random() * 500, 
                    easing: 'ease-out' 
                }).onfinish = () => p.remove();
            }
        }

        function triggerFireworks() {
            playSound('firework');
            
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    const offsetX = (Math.random() - 0.5) * 300;
                    const offsetY = (Math.random() - 0.5) * 200;
                    const color = fireworkColors[Math.floor(Math.random() * fireworkColors.length)];
                    createSingleFirework(centerX + offsetX, centerY + offsetY, color);
                }, i * 300);
            }
            
            setTimeout(() => {
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        const x = Math.random() * window.innerWidth;
                        const y = Math.random() * (window.innerHeight * 0.6);
                        const color = fireworkColors[Math.floor(Math.random() * fireworkColors.length)];
                        createSingleFirework(x, y, color);
                    }, i * 150);
                }
            }, 1000);
            
            const hint = document.createElement('div');
            hint.className = 'firework-hint';
            hint.textContent = '🎆 烟花来啦！';
            document.body.appendChild(hint);
            setTimeout(() => hint.remove(), 2000);
        }

        function moveTarget() {
            const margin = 30;
            const x = margin + Math.random() * (100 - margin * 2);
            const y = margin + Math.random() * (100 - margin * 2);
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            target.style.left = x + '%';
            target.style.top = y + '%';
            target.style.backgroundColor = color;
            targetSvg.querySelector('path').setAttribute('d', getNextShape());
            
            target.style.animation = 'none';
            target.offsetHeight; 
            target.style.animation = 'appear 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
        }

        function createParticles() {
            const pColors = [...colors, '#FFF'];
            for (let i = 0; i < 30; i++) {
                const p = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                p.setAttribute('viewBox', '0 0 24 24');
                p.classList.add('particle');
                p.innerHTML = '<path d="M12 2L15 9H22L16.5,13.5L18.5,21L12,16.5L5.5,21L7.5,13.5L2,9H9L12,2Z"></path>';
                p.style.fill = pColors[Math.floor(Math.random() * pColors.length)];
                
                const angle = Math.random() * Math.PI * 2;
                const dist = 60 + Math.random() * 320;
                const tx = Math.cos(angle) * dist;
                const ty = Math.sin(angle) * dist;

                document.body.appendChild(p);
                p.style.left = '50%';
                p.style.top = '50%';
                
                p.animate([
                    { transform: 'translate(-50%, -50%) scale(0) rotate(0deg)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(3) rotate(${360 + Math.random()*360}deg)`, opacity: 0 }
                ], { duration: 1500, easing: 'ease-out' }).onfinish = () => p.remove();
            }
        }

        target.addEventListener('click', (e) => {
            score++;
            combo++;
            clickCount++;
            scoreVal.textContent = score;
            hint.style.display = 'none';

            updateProgressDots();

            if (clickCount === 5) {
                clickCount = 0;
                updateProgressDots();
                triggerFireworks();
            }

            comboBadge.style.display = combo > 1 ? 'block' : 'none';
            comboBadge.textContent = combo + ' 连击!';
            
            if (comboTimer) clearTimeout(comboTimer);
            comboTimer = setTimeout(() => {
                combo = 0;
                comboBadge.style.display = 'none';
            }, 3000);

            const newLevel = Math.floor(score / 10) + 1;
            if (newLevel > level) {
                level = newLevel;
                levelBadge.textContent = '第 ' + level + ' 关';
                document.body.style.backgroundColor = level % 2 === 0 ? '#F1F5F9' : '#F8FAFC';
                playSound('level');
                showReward('升级啦!', '<path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"></path>');
            } else if (combo % 10 === 0) {
                playSound('explode');
                showReward('超强连击!', '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>');
                triggerFlash();
            } else {
                playSound('pop');
            }

            if (rewardOverlay.style.display !== 'flex') {
                moveTarget();
            }
        });

        function triggerFlash() {
            flash.animate([{ opacity: 0.3 }, { opacity: 0 }], { duration: 500 });
        }

        target.addEventListener('touchstart', (e) => {
            e.preventDefault();
            target.click();
        });

        function showReward(msg, iconPath) {
            rewardMsg.textContent = msg;
            rewardIcon.innerHTML = iconPath;
            rewardOverlay.style.display = 'flex';
            createParticles();
            setTimeout(() => {
                rewardOverlay.style.display = 'none';
                if (score > 0) moveTarget();
            }, 2000);
        }

        moveTarget();
        updateProgressDots();
    </script>
</body>
</html>
