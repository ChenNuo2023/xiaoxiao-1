    <style>
        :root {
            --red: #FB7185;
            --blue: #38BDF8;
            --yellow: #FDE047;
            --green: #4ADE80;
            --purple: #C084FC;
            --bg: #F8FAFC;
            --slate-800: #1E293B;
            --slate-300: #E2E8F0;
            --orange: #FB923C;
            --pink: #F472B6;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            font-family: 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            transition: background-color 1s ease;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #target {
            position: absolute;
            width: 55vmin;
            height: 55vmin;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 15px 45px rgba(0,0,0,0.18), 0 0 30px rgba(253,224,71,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translate(-50%, -50%) scale(1);
            animation: appear 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            touch-action: manipulation;
            z-index: 20;
            transition: box-shadow 0.3s ease;
        }

        #target:active {
            transform: translate(-50%, -50%) scale(0.85);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2), 0 0 50px rgba(253,224,71,0.6);
        }

        @keyframes appear {
            0% { transform: translate(-50%, -50%) scale(0.2) rotate(-45deg); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.1) rotate(5deg); }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
        }

        svg {
            width: 70%;
            height: 70%;
            fill: white;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.12));
        }

        #hud {
            position: absolute;
            top: env(safe-area-inset-top, 24px);
            left: 24px;
            right: 24px;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            z-index: 30;
            pointer-events: none;
            flex-wrap: wrap;
        }

        .hud-item {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 24px;
            border: 3px solid var(--slate-300);
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            pointer-events: auto;
        }

        #score-board {
            font-size: 28px;
            font-weight: 900;
            color: var(--slate-800);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #level-badge {
            background: var(--slate-800);
            color: white;
            padding: 8px 20px;
            border-radius: 999px;
            font-weight: 800;
            font-size: 18px;
            border: 3px solid white;
        }

        #combo-badge {
            background: var(--orange);
            color: white;
            padding: 8px 20px;
            border-radius: 999px;
            font-weight: 900;
            font-size: 18px;
            font-style: italic;
            border: 3px solid white;
            display: none;
            animation: combo-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #streak-badge {
            background: var(--purple);
            color: white;
            padding: 8px 20px;
            border-radius: 999px;
            font-weight: 900;
            font-size: 18px;
            border: 3px solid white;
        }

        @keyframes combo-in {
            0% { transform: scale(0); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        #click-progress {
            position: absolute;
            bottom: calc(env(safe-area-inset-bottom, 20px) + 120px);
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 30;
            pointer-events: none;
        }

        .progress-dot {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            border: 4px solid var(--slate-300);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .progress-dot.active {
            background: var(--yellow);
            border-color: var(--orange);
            transform: scale(1.3);
            box-shadow: 0 0 30px rgba(250,204,21,0.7);
        }

        .progress-dot .star-emoji {
            font-size: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .progress-dot.active .star-emoji {
            opacity: 1;
        }

        #reward-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(30px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            pointer-events: none;
        }

        #reward-icon {
            width: 220px;
            height: 220px;
            fill: var(--yellow);
            filter: drop-shadow(0 0 40px rgba(250,204,21,0.7));
            animation: reward-bounce 0.6s ease infinite;
        }

        @keyframes reward-bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .reward-text {
            font-size: 56px;
            font-weight: 900;
            color: var(--slate-800);
            margin-top: 24px;
            letter-spacing: -2px;
            text-align: center;
        }

        .reward-emojis {
            font-size: 48px;
            margin-top: 16px;
            display: flex;
            gap: 12px;
        }

        .particle {
            position: absolute;
            width: 40px;
            height: 40px;
            pointer-events: none;
            z-index: 110;
        }

        .firework-particle {
            position: absolute;
            width: 24px;
            height: 24px;
            pointer-events: none;
            z-index: 90;
            border-radius: 50%;
        }

        .firework-particle.star {
            width: 36px;
            height: 36px;
            border-radius: 0;
        }

        #hint {
            position: absolute;
            bottom: 80px;
            width: 100%;
            text-align: center;
            color: #94A3B8;
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 2px;
            animation: hint-bounce 1.5s ease-in-out infinite;
        }

        @keyframes hint-bounce {
            0%, 100% { transform: translateY(0); opacity: 0.6; }
            50% { transform: translateY(-15px); opacity: 1; }
        }

        #flash {
            position: fixed;
            inset: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 15;
        }

        .firework-hint {
            position: absolute;
            bottom: 240px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 36px;
            font-weight: 900;
            color: var(--orange);
            text-shadow: 0 0 30px rgba(251,146,60,0.7);
            animation: firework-pulse 0.5s ease-in-out infinite;
            z-index: 25;
            pointer-events: none;
            white-space: nowrap;
        }

        @keyframes firework-pulse {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.2); }
        }

        /* 成就弹窗样式 */
        #achievement-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            z-index: 150;
            pointer-events: none;
            padding-top: 60px;
        }

        .achievement-banner {
            background: linear-gradient(135deg, var(--yellow), var(--orange));
            padding: 24px 48px;
            border-radius: 30px;
            border: 5px solid white;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 20px;
            animation: achievement-slide 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes achievement-slide {
            0% { transform: translateY(-100px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .achievement-icon {
            font-size: 56px;
        }

        .achievement-content {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .achievement-title {
            font-size: 28px;
            font-weight: 900;
            color: var(--slate-800);
        }

        .achievement-desc {
            font-size: 20px;
            font-weight: 700;
            color: rgba(30,41,59,0.8);
        }

        /* 收集物面板 */
        #collection-panel {
            display: flex;
            gap: 8px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            padding: 10px 16px;
            border-radius: 20px;
            border: 3px solid var(--slate-300);
        }

        .collection-item {
            font-size: 28px;
            opacity: 0.3;
            transition: all 0.3s ease;
            filter: grayscale(1);
        }

        .collection-item.collected {
            opacity: 1;
            filter: grayscale(0);
            transform: scale(1.2);
        }

        /* 魔法按钮 */
        #magic-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--purple), var(--pink));
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 8px 25px rgba(192,132,252,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            z-index: 30;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: magic-glow 2s ease-in-out infinite;
        }

        #magic-btn:active {
            transform: scale(0.9);
        }

        @keyframes magic-glow {
            0%, 100% { box-shadow: 0 8px 25px rgba(192,132,252,0.4); }
            50% { box-shadow: 0 8px 40px rgba(192,132,252,0.7); }
        }

        /* 彩虹雨特效 */
        .rain-drop {
            position: fixed;
            top: -50px;
            font-size: 40px;
            pointer-events: none;
            z-index: 50;
            animation: rain-fall linear forwards;
        }

        @keyframes rain-fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(calc(100vh + 50px)) rotate(360deg); opacity: 0; }
        }

        @media (min-width: 768px) {
            #score-board { font-size: 36px; }
            .reward-text { font-size: 72px; }
            #level-badge, #combo-badge, #streak-badge { font-size: 22px; }
            .progress-dot { width: 44px; height: 44px; }
        }
    </style>
</head>
<body>
    <div id="flash"></div>

    <div id="game-container">
        <div id="hud">
            <div class="hud-item" id="score-board">
                <span>⭐</span>
                <span>得分:</span>
                <span id="score">0</span>
            </div>
            <div id="collection-panel">
                <span class="collection-item" id="item-1">🌟</span>
                <span class="collection-item" id="item-2">💎</span>
                <span class="collection-item" id="item-3">🎁</span>
                <span class="collection-item" id="item-4">🏆</span>
                <span class="collection-item" id="item-5">👑</span>
            </div>
            <div id="level-badge">第 1 关</div>
            <div id="streak-badge">🔥 0</div>
            <div id="combo-badge">0 连击!</div>
        </div>
        
        <div id="target">
            <svg viewBox="0 0 24 24" id="target-svg">
                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>
            </svg>
        </div>

        <div id="click-progress">
            <div class="progress-dot" id="dot-1"><span class="star-emoji">⭐</span></div>
            <div class="progress-dot" id="dot-2"><span class="star-emoji">⭐</span></div>
            <div class="progress-dot" id="dot-3"><span class="star-emoji">⭐</span></div>
            <div class="progress-dot" id="dot-4"><span class="star-emoji">⭐</span></div>
            <div class="progress-dot" id="dot-5"><span class="star-emoji">⭐</span></div>
        </div>

        <div id="hint">👆 点一点彩色的目标吧!</div>
        
        <div id="magic-btn" title="魔法特效">✨</div>
    </div>

    <div id="reward-overlay">
        <svg id="reward-icon" viewBox="0 0 24 24"></svg>
        <div class="reward-text" id="reward-msg">升级啦!</div>
        <div class="reward-emojis" id="reward-emojis">🎉🎊🌟</div>
    </div>

    <div id="achievement-overlay">
        <div class="achievement-banner" id="achievement-banner">
            <span class="achievement-icon" id="achievement-icon">🏆</span>
            <div class="achievement-content">
                <div class="achievement-title" id="achievement-title">成就解锁!</div>
                <div class="achievement-desc" id="achievement-desc">太棒了!</div>
            </div>
        </div>
    </div>

    <script>
        const target = document.getElementById('target');
        const scoreVal = document.getElementById('score');
        const levelBadge = document.getElementById('level-badge');
        const comboBadge = document.getElementById('combo-badge');
        const streakBadge = document.getElementById('streak-badge');
        const targetSvg = document.getElementById('target-svg');
        const rewardOverlay = document.getElementById('reward-overlay');
        const rewardIcon = document.getElementById('reward-icon');
        const rewardMsg = document.getElementById('reward-msg');
        const rewardEmojis = document.getElementById('reward-emojis');
        const hint = document.getElementById('hint');
        const flash = document.getElementById('flash');
        const magicBtn = document.getElementById('magic-btn');
        const achievementOverlay = document.getElementById('achievement-overlay');
        
        let score = 0;
        let combo = 0;
        let level = 1;
        let comboTimer = null;
        let audioCtx = null;
        let clickCount = 0;
        let streak = 0;
        let maxStreak = 0;
        let collection = [false, false, false, false, false];
        let lastClickTime = Date.now();

        const colors = ['#FB7185', '#38BDF8', '#FDE047', '#4ADE80', '#C084FC', '#FB923C', '#06B6D4', '#F472B6'];
        const fireworkColors = ['#FB7185', '#38BDF8', '#FDE047', '#4ADE80', '#C084FC', '#FB923C', '#06B6D4', '#A78BFA', '#F472B6', '#14B8A6'];
        
        const ALL_SHAPES = [
            'M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z',
            'M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z',
            'M12 2L4.5 20.29 5.21 21 12 18 18.79 21 19.5 20.29 12 2z',
            'M21 16.5L12.6 21.8C12.4 21.9 12.2 22 12 22C11.8 22 11.6 21.9 11.4 21.8L3 16.5V7.5L11.4 2.2C11.6 2.1 11.8 2 12 2C12.2 2 12.4 2.1 12.6 2.2L21 7.5V16.5z',
            'M12 2C6.5 2 2 6.5 2 12C2 17.5 6.5 22 12 22C17.5 22 22 17.5 22 12C22 6.5 17.5 2 12 2M12 20C7.6 20 4 16.4 4 12C4 7.6 7.6 4 12 4C16.4 4 20 7.6 20 12C20 16.4 16.4 20 12 20M12 7L15 10H13V17H11V10H9L12 7z',
            'M20 6H16V3C16 1.9 15.1 1 14 1H10C8.9 1 8 1.9 8 3V6H4C2.9 6 2.01 6.9 2.01 8L2 21C2 22.1 2.9 23 4 23H20C21.1 23 22 22.1 22 21V8C22 6.9 21.1 6 20 6M10 3H14V6H10V3M20 21H4V8H20V21z',

            'M19 13H13V19H11V13H5V11H11V5H13V11H19V13z',
            'M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z'
        ];

        const emojis = ['🌟', '⭐', '✨', '💫', '🌈', '🎪', '🎈', '🎀', '🎁', '🎉', '🎊', '🎨', '🎭', '🎯', '🎲'];
        const achievementEmojis = ['🏆', '👑', '💎', '🌟', '🎯', '⭐', '✨', '🔥', '💪', '🎪'];
        const achievementTitles = ['太棒了!', '超级棒!', '你真厉害!', '天才小玩家!', '小能手!', '厉害厉害!', '太棒了!', '神奇!', '好厉害!', '超级玩家!'];
        const achievementDescs = ['继续加油哦~', '你是最棒的!', '再点一点吧~', '精彩继续!', '开心玩游戏!', '越来越棒了!', '继续冒险吧!', '创造新纪录!', '你是小明星!', '挑战极限!'];
        const rainEmojis = ['🌈', '⭐', '🌟', '✨', '💫', '🎈', '🎁', '🎉', '🎊', '💎', '👑', '🏆'];

        let shapeBag = [];
        function getNextShape() {
            if (shapeBag.length === 0) {
                shapeBag = [...ALL_SHAPES];
                for (let i = shapeBag.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shapeBag[i], shapeBag[j]] = [shapeBag[j], shapeBag[i]];
                }
                console.log("图案包已重置!");
            }
            return shapeBag.pop();
        }

        function updateProgressDots() {
            for (let i = 1; i <= 5; i++) {
                const dot = document.getElementById('dot-' + i);
                if (i <= clickCount) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            }
        }

        function playSound(type) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                const now = audioCtx.currentTime;
                
                if (type === 'level') {
                    const freqs = [523.25, 659.25, 783.99, 1046.50, 1318.51];
                    freqs.forEach((f, i) => {
                        const o = audioCtx.createOscillator();
                        const g = audioCtx.createGain();
                        o.connect(g); g.connect(audioCtx.destination);
                        o.type = 'sine';
                        o.frequency.setValueAtTime(f, now + i * 0.1);
                        g.gain.setValueAtTime(0.2, now + i * 0.1);
                        g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.5);
                        o.start(now + i * 0.1); o.stop(now + i * 0.1 + 0.5);
                    });
                } else if (type === 'pop') {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.frequency.setValueAtTime(400 + Math.random() * 200, now);
                    osc.frequency.exponentialRampToValueAtTime(200, now + 0.15);
                    gain.gain.setValueAtTime(0.25, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                    osc.start(now); osc.stop(now + 0.15);
                } else if (type === 'explode') {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(200, now);
                    osc.frequency.exponentialRampToValueAtTime(50, now + 0.4);
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                    osc.start(now); osc.stop(now + 0.4);
                } else if (type === 'firework') {
                    const freqs = [600, 750, 900, 1200, 1500];
                    freqs.forEach((f, i) => {
                        const o = audioCtx.createOscillator();
                        const g = audioCtx.createGain();
                        o.connect(g); g.connect(audioCtx.destination);
                        o.type = 'sine';
                        o.frequency.setValueAtTime(f, now + i * 0.08);
                        g.gain.setValueAtTime(0.18, now + i * 0.08);
                        g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.4);
                        o.start(now + i * 0.08); o.stop(now + i * 0.08 + 0.4);
                    });
                } else if (type === 'magic') {
                    const freqs = [400, 500, 600, 700, 800, 1000, 1200, 1400, 1600];
                    freqs.forEach((f, i) => {
                        const o = audioCtx.createOscillator();
                        const g = audioCtx.createGain();
                        o.connect(g); g.connect(audioCtx.destination);
                        o.type = 'sine';
                        o.frequency.setValueAtTime(f, now + i * 0.05);
                        g.gain.setValueAtTime(0.12, now + i * 0.05);
                        g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.05 + 0.3);
                        o.start(now + i * 0.05); o.stop(now + i * 0.05 + 0.3);
                    });
                } else if (type === 'achievement') {
                    const freqs = [523.25, 659.25, 783.99, 1046.50, 1318.51, 1567.98];
                    freqs.forEach((f, i) => {
                        const o = audioCtx.createOscillator();
                        const g = audioCtx.createGain();
                        o.connect(g); g.connect(audioCtx.destination);
                        o.type = 'triangle';
                        o.frequency.setValueAtTime(f, now + i * 0.1);
                        g.gain.setValueAtTime(0.2, now + i * 0.1);
                        g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.4);
                        o.start(now + i * 0.1); o.stop(now + i * 0.1 + 0.4);
                    });
                }
            } catch(e) {}
        }

        function createSingleFirework(x, y, color) {
            const particleCount = 16;
            for (let i = 0; i < particleCount; i++) {
                const p = document.createElement('div');
                p.className = 'firework-particle';
                if (Math.random() > 0.5) p.classList.add('star');
                
                const angle = (i / particleCount) * Math.PI * 2;
                const dist = 100 + Math.random() * 80;
                const tx = Math.cos(angle) * dist;
                const ty = Math.sin(angle) * dist;
                
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                p.style.backgroundColor = color;
                p.style.boxShadow = `0 0 20px ${color}, 0 0 40px ${color}`;
                
                if (p.classList.contains('star')) {
                    const starEmoji = emojis[Math.floor(Math.random() * emojis.length)];
                    p.innerHTML = `<span style="font-size: 28px">${starEmoji}</span>`;
                    p.style.backgroundColor = 'transparent';
                    p.style.boxShadow = 'none';
                }
                
                document.body.appendChild(p);
                
                const rotation = Math.random() * 720 - 360;
                p.animate([
                    { transform: 'translate(-50%, -50%) scale(0) rotate(0deg)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(2.5) rotate(${rotation}deg)`, opacity: 0 }
                ], { duration: 1200 + Math.random() * 400, easing: 'cubic-bezier(0.175, 0.885, 0.32, 1.275)' }).onfinish = () => p.remove();
            }
        }

        function triggerFireworks() {
            playSound('firework');
            
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            for (let i = 0; i < 4; i++) {
                setTimeout(() => {
                    const offsetX = (Math.random() - 0.5) * 400;
                    const offsetY = (Math.random() - 0.5) * 300;
                    const color = fireworkColors[Math.floor(Math.random() * fireworkColors.length)];
                    createSingleFirework(centerX + offsetX, centerY + offsetY, color);
                }, i * 200);
            }
            
            setTimeout(() => {
                for (let i = 0; i < 8; i++) {
                    setTimeout(() => {
                        const x = Math.random() * window.innerWidth;
                        const y = Math.random() * (window.innerHeight * 0.7);
                        const color = fireworkColors[Math.floor(Math.random() * fireworkColors.length)];
                        createSingleFirework(x, y, color);
                    }, i * 100);
                }
            }, 1000);
            
            const hintText = document.createElement('div');
            hintText.className = 'firework-hint';
            hintText.textContent = '🎆 烟花来啦! 🎆';
            document.body.appendChild(hintText);
            setTimeout(() => hintText.remove(), 2500);
        }

        function triggerRain() {
            playSound('magic');
            
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const drop = document.createElement('div');
                    drop.className = 'rain-drop';
                    drop.textContent = rainEmojis[Math.floor(Math.random() * rainEmojis.length)];
                    drop.style.left = Math.random() * window.innerWidth + 'px';
                    drop.style.animationDuration = (2 + Math.random() * 2) + 's';
                    drop.style.animationDelay = '0s';
                    document.body.appendChild(drop);
                    
                    setTimeout(() => drop.remove(), 4000);
                }, i * 60);
            }
        }

        function triggerAchievement(icon, title, desc) {
            playSound('achievement');
            
            document.getElementById('achievement-icon').textContent = icon;
            document.getElementById('achievement-title').textContent = title;
            document.getElementById('achievement-desc').textContent = desc;
            
            achievementOverlay.style.display = 'flex';
            
            setTimeout(() => {
                achievementOverlay.style.display = 'none';
            }, 2500);
        }

        function checkAchievements() {
            if (score === 10 && !collection[0]) {
                collection[0] = true;
                document.getElementById('item-1').classList.add('collected');
                triggerAchievement('🌟', '第一颗星星!', '你收集到第一颗星星啦!');
            } else if (score === 30 && !collection[1]) {
                collection[1] = true;
                document.getElementById('item-2').classList.add('collected');
                triggerAchievement('💎', '闪耀钻石!', '太棒了，钻石到手!');
            } else if (score === 60 && !collection[2]) {
                collection[2] = true;
                document.getElementById('item-3').classList.add('collected');
                triggerAchievement('🎁', '惊喜礼物!', '你收到了一份礼物!');
            } else if (score === 100 && !collection[3]) {
                collection[3] = true;
                document.getElementById('item-4').classList.add('collected');
                triggerAchievement('🏆', '冠军奖杯!', '你是超级小冠军!');
            } else if (score === 150 && !collection[4]) {
                collection[4] = true;
                document.getElementById('item-5').classList.add('collected');
                triggerAchievement('👑', '皇冠加冕!', '你是游戏小国王/女王!');
            }
        }

        function moveTarget() {
            const margin = 15;
            const x = margin + Math.random() * (100 - margin * 2);
            const y = margin + Math.random() * (100 - margin * 2);
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            target.style.left = x + '%';
            target.style.top = y + '%';
            target.style.backgroundColor = color;
            targetSvg.querySelector('path').setAttribute('d', getNextShape());
            
            target.style.animation = 'none';
            target.offsetHeight; 
            target.style.animation = 'appear 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
        }

        function createParticles() {
            const pColors = [...colors, '#FFF'];
            for (let i = 0; i < 35; i++) {
                const p = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                p.setAttribute('viewBox', '0 0 24 24');
                p.className = 'particle';
                p.innerHTML = '<path d="M12 2L15 9H22L16.5 13.5 18.5 21 12 17.5 5.5 21 7.5 13.5 2 9H9L12 2z"></path>';
                p.style.fill = pColors[Math.floor(Math.random() * pColors.length)];
                
                const angle = Math.random() * Math.PI * 2;
                const dist = 80 + Math.random() * 350;
                const tx = Math.cos(angle) * dist;
                const ty = Math.sin(angle) * dist;

                document.body.appendChild(p);
                p.style.left = '50%';
                p.style.top = '50%';
                
                p.animate([
                    { transform: 'translate(-50%, -50%) scale(0) rotate(0deg)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(3) rotate(${360 + Math.random()*360}deg)`, opacity: 0 }
                ], { duration: 1400, easing: 'ease-out' }).onfinish = () => p.remove();
            }
        }

        function triggerFlash() {
            flash.animate([{ opacity: 0.4 }, { opacity: 0 }], { duration: 500, easing: 'ease-out' });
        }

        function showReward(msg, iconPath, emojiStr) {
            rewardMsg.textContent = msg;
            rewardIcon.innerHTML = iconPath;
            rewardEmojis.textContent = emojiStr;
            rewardOverlay.style.display = 'flex';
            createParticles();
            setTimeout(() => {
                rewardOverlay.style.display = 'none';
                if (score > 0) moveTarget();
            }, 2200);
        }

        target.addEventListener('click', (e) => {
            score++;
            combo++;
            clickCount++;
            hint.style.display = 'none';
            
            const now = Date.now();
            if (now - lastClickTime < 2000) {
                streak++;
            } else {
                streak = 1;
            }
            lastClickTime = now;
            
            if (streak > maxStreak) {
                maxStreak = streak;
            }
            
            scoreVal.textContent = score;
            streakBadge.textContent = '🔥 ' + streak;
            
            updateProgressDots();

            if (clickCount === 5) {
                clickCount = 0;
                updateProgressDots();
                triggerFireworks();
            }

            comboBadge.style.display = combo > 1 ? 'block' : 'none';
            comboBadge.textContent = combo + ' 连击!';
            
            if (comboTimer) clearTimeout(comboTimer);
            comboTimer = setTimeout(() => {
                combo = 0;
                comboBadge.style.display = 'none';
            }, 2500);

            checkAchievements();

            const newLevel = Math.floor(score / 10) + 1;
            if (newLevel > level) {
                level = newLevel;
                levelBadge.textContent = '第 ' + level + ' 关';
                document.body.style.backgroundColor = level % 2 === 0 ? '#EFF6FF' : '#F8FAFC';
                playSound('level');
                showReward('🎉 升级啦! 🎉', '<path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"></path>', '🎊🌟✨');
                return;
            } else if (combo % 10 === 0 && combo > 0) {
                playSound('explode');
                showReward('💥 超级连击! 💥', '<path d="M13 10h-2V8h2V10zm0 6h-2v-4h2V4z M12 2C10 2 4 2 4 2v12c0 0 0 10 8 10 8 0 8-10 8-10V2c0 0-6 0-8 0M12 20c-2 0-6 0-6-6V4h4v4l2-2 2 2V4h4v10c0 6-4 6-6 6z"></path>', '🔥💪⭐');
                triggerFlash();
                return;
            } else {
                playSound('pop');
            }

            if (rewardOverlay.style.display !== 'flex') {
                moveTarget();
            }
        });

        target.addEventListener('touchstart', (e) => {
            e.preventDefault();
            target.click();
        });

        magicBtn.addEventListener('click', () => {
            triggerRain();
        });

        magicBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            triggerRain();
        });

        moveTarget();
        updateProgressDots();
    </script>
</body>
</html>
